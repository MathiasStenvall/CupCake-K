<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin_Saldo</title>

    <link rel="stylesheet" th:href="@{/css/Stylesheet.css}">
</head>
<body>

<header>
    <div class="header">
        <nav class="navCenter">
            <div class="logoplace">
                <a th:href="@{/index}">
                    <img src="/images/logoMuffin.png" class="logoSize" alt="">
                </a>
            </div>
        </nav>

        <ul class="account">
            <div id="email" th:if="${session.user != null}">
                <p th:text="${session.user.email}"></p>
            </div>
            <li th:if="${session.user != null}"><a th:href="@{/logout}">Log Ud</a></li>
        </ul>
    </div>

    <nav class="navCenter">
        <div class="admin">
            <ul class="menu">

                <li><a th:href="@{/adminorders}">Ordre Oversigt</a></li>

                <li><a th:href="@{/adminuserinfo}">Kunde Oversigt</a></li>

                <li><a th:href="@{/adminsaldo}">Tilføj Saldo</a></li>

                <li><a th:href="@{/admincreateadmin}">Opret Admin</a></li>

            </ul>
        </div>
    </nav>

</header>
<main>
    <nav class="navCenter">
        <h2>Tilføj-Saldo</h2>
        <form th:action="@{/viewusernumber}" method="post">
            <div class="infoTabel">
                <div class="input-group-admin">
                    <label for="customer_number">Kunde nr:</label>
                    <input type="number" id="customer_number" name="customer_number">
                </div>

                <div class="button-group">
                    <button type="submit">Søg kundenummer</button>
                </div>
            </div>
        </form>
    </nav>
    <nav class="navCenter">
        <form method="post" th:action="@{/saldoIndput}">
        <div class="adminTabel">

            <div class="tableWrapper">
                <table class="tableStyle">
                    <thead>
                    <tr>
                        <th>Kunde nr.</th>
                        <th>Saldo</th>
                        <th>Tilføj saldo</th>
                    </tr>
                    </thead>
                    <tbody class="bodyText">
                    <tr th:each="client : ${client}">
                        <td th:text="${client.userID}"></td>
                        <td th:text="${client.balance}"></td>

                        <td>
                                <input type="number" name="input_saldo" required>
                        </td>
                    <tbody>

                </table>
            </div>
        </div>
            <button type="submit">Tilføj Saldo</button>
        </form>
    </nav>

</main>
</body>
</html>
