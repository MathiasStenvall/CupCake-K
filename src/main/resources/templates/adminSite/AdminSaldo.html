<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Admin_Saldo</title>

    <link rel="stylesheet" th:href="@{/css/Stylesheet.css}">
</head>
<body>

<header>
    <div class="header">
        <nav class="navCenter">
            <div class="logoplace">
                <a th:href="@{/index}">
                    <img src="/images/logoMuffin.png" class="logoSize" alt="">
                </a>
            </div>
        </nav>
        <div id="email">E-mail</div>
        <ul class="admin_account">
            <li><a th:href="@{/admin}">Admin</a></li>
            <li><a th:href="@{/index}">Log Ud</a></li>
        </ul>
    </div>

    <nav class="navCenter">
        <ul class="menu">

            <li><a th:href="@{/adminorders}">Ordre Oversigt</a></li>

            <li><a th:href="@{/adminuserinfo}">Kunde Oversigt</a></li>

            <li><a th:href="@{/adminsaldo}">Tilføj Saldo</a></li>

            <li><a th:href="@{/admincreateadmin}">Opret Admin</a></li>

        </ul>
    </nav>

</header>

<h2>Tilføj-Saldo</h2>
<div class="infoTabel">
    <div class="input-group-admin">
        <label for="customer_number">Kunde nr:</label>
        <input type="text" id="customer_number" name="customer_number">

        <form action="/viewusernumber" method="get">
            <button type="submit">Søg kundenummer</button>
        </form>

    </div>
</div>

<nav class="navCenter">
    <div class="tableWrapper">
        <table class="tableStyle">
            <thead>
            <tr>
                <th>Kunde nr.</th>
                <th>Saldo</th>
                <th>Tilføj saldo</th>
            </tr>
            </thead>
            <tbody class="bodyText">
            <tr th:each="customer : ${customerList}">
                <td th:text="${customer.kunde_nummer}"></td>
                <td th:text="${customer.kunde_saldo}"></td>
                <td th:text="${customer.kunde_opdatert_saldo}"></td>
            <tbody>

        </table>
    </div>
</nav>

<form action="/updateusersaldo" method="post">
    <button type="submit">Tilføj Saldo</button>
</form>

</body>
</html>
