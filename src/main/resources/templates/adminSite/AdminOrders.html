<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin_Orders</title>

    <link rel="stylesheet" th:href="@{/css/Stylesheet.css}">
</head>
<body>

<header>
    <div class="header">
        <nav class="navCenter">
            <div class="logoplace">
                <a th:href="@{/index}">
                    <img src="/images/logoMuffin.png" class="logoSize" alt="">
                </a>
            </div>
        </nav>

        <ul class="account">
            <div id="email" th:if="${session.user != null}">
                <p th:text="${session.user.email}"></p>
            </div>
            <li th:if="${session.user != null}"><a th:href="@{/logout}">Log Ud</a></li>
        </ul>
    </div>

    <nav class="navCenter">
        <div class="admin">
            <ul class="menu">

                <li><a th:href="@{/adminorders}">Ordre Oversigt</a></li>

                <li><a th:href="@{/adminuserinfo}">Kunde Oversigt</a></li>

                <li><a th:href="@{/adminsaldo}">Tilføj Saldo</a></li>

                <li><a th:href="@{/adminscreateadmin}">Opret Admin</a></li>

            </ul>
        </div>
    </nav>

</header>
<main>
    <nav class="navCenter">
        <h2>Ordre-Oversigt</h2>
        <form th:action="@{/vieworderinfo}" method="post">
            <div class="infoTabel">

                <div class="input-group-admin">

                    <label for="ordre_date">Dato:</label>
                    <input type="text" id="ordre_date" name="ordre_date">

                    <label for="customer_number">Kunde nr.:</label>
                    <input type="number" id="customer_number" name="customer_number">

                </div>
                <div class="input-group-admin">
                    <label for="ordre_number">Ordre nr:</label>
                    <input type="number" id="ordre_number" name="ordre_number">
                    <p></p>
                    <button type="submit">Søg</button>
                </div>
            </div>
        </form>
    </nav>

    <nav class="navCenter">
        <div class="adminTabel">
            <div class="tableWrapper">
                <table class="tableStyle">
                    <thead>
                    <tr>
                        <th>Ordre nr.</th>
                        <th>Kunde nr.</th>
                        <th>Status</th>
                        <th>Rediger</th>
                    </tr>
                    </thead>
                    <tbody class="bodyText">
                    <tr th:each="order : ${orderList}">
                        <td th:text="${order.orderId}"></td>
                        <td th:text="${order.userId}"></td>
                        <td th:text="${order.paid}"></td>

                        <td class="action">
                            <form method="post" th:action="@{/deleteOrder}">
                                <input type="hidden" name="deleteOrder" th:value="@{deleteOrder}"/>
                                <button class="fotoIkon">
                                    <img src="/images/x.png">
                                </button>
                            </form>
                        </td>

                    <tbody>

                </table>
            </div>
        </div>
    </nav>
</main>
</body>
</html>
