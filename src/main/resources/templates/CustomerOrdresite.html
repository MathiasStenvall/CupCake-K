<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil_Dine_ordre</title>
</head>
<body>
<header>

    <div class="header">
        <nav class="navCenter">
            <div class="logoplace">
                <a th:href="@{/index}">
                    <img src="/images/logoMuffin.png" class="logoSize">
                </a>
            </div>
        </nav>
        <ul class="account">
            <div id="email" th:if="${session.user != null}">
                <p th:text="${session.user.email}"></p>
            </div>
            <li th:if="${session.user == null}"><a th:href="@{/login}">Login </a></li>
            <li th:if="${session.user == null}"><a th:href="@{/creatingAccount}">Opret bruger </a></li>
            <li th:if="${session.user != null && session.user.role == 'admin'}"><a th:href="@{/adminsite}">Admin</a></li>
            <li th:if="${session.user != null && session.user.role == 'client'}"><a th:href="@{/profile}">Profil</a></li>
            <li th:if="${session.user != null}"><a th:href="@{/logout}">Log Ud</a></li>
        </ul>
    </div>

    <nav class="navCenter">
        <ul class="menu">
            <li><a th:href="@{/ordre}"> Bestil </a></li>
            <li><a th:href="@{/gallery}"> Galleri </a></li>
            <a th:href="@{/basket}">
                <img src="/images/kurv.png" class="fotoIkon">
            </a>
        </ul>
    </nav>

    <nav class="navCenter">
        <div class="menuLine">
        </div>
    </nav>

</header>

<main>


    <nav class="navCenter">
            <div class="tableWrapper">
                <table class="tableStyle">
                    <thead class="bodyText">
                    <tr>
                        <th>Ordre nr.</th>
                        <th>dato</th>
                        <th>pris</th>
                        <th>status</th>
                    </tr>
                    </thead>
                    <tbody class="bodyText">

                    <tr th:each="ordrers : ${ordreList}">
                        <td th:text="${ordrers.ordre_number}"></td>
                        <td th:text="${ordrers.date}"></td>
                        <td th:text="${ordrers.price}"></td>
                        <td th:text="${ordrers.status}"><td>
                        </td>
                        <td class="action">
                            <form method="post" th:action="@{/pay}">
                                <button type="submit"> Betal </button>
                            </form>
                        </td>

                    <tbody>
                </table>
            </div>
    </nav>


    <p class="top-nav"></p>


</main>

<footer>
    <div class="navCenter">
        <ul class="footerDesign">
            <li><a th:href="@{/location}"> Find os </a></li>
            <li><a th:href="@{/contact}"> Kontakt </a></li>
            <li><a th:href="@{/about}"> Om os </a></li>
        </ul>
    </div>
</footer>





</body>
</html>
